<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <div slot="start" class="logo-container">
      <img src="assets/icon/logo-bagels.png" alt="BagelsOnly Logo">
    </div>

    <ion-title>BagelsOnly</ion-title>
    
    <ion-buttons slot="end">
      <ion-button color="primary">
        <ion-icon name="person-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <h2>Explorar Rankings</h2>
  <p>Selecciona una zona para ver a los mejores tenistas.</p>

  <ion-card class="ranking-card" id="open-ranking-tijuana">
    <img src="https://images.unsplash.com/photo-1593110050241-ee7ce35e9702?q=80&w=500" alt="Tijuana">
    <div class="card-overlay">
      <ion-card-header>
        <ion-card-title>Tijuana</ion-card-title>
        <ion-card-subtitle>AMT Estatal</ion-card-subtitle>
      </ion-card-header>
    </div>
  </ion-card>

  <ion-card class="ranking-card" id="open-ranking-ensenada">
    <img src="https://images.unsplash.com/photo-1612110684507-307ca8f01b7a?q=80&w=500" alt="Ensenada">
    <div class="card-overlay">
      <ion-card-header>
        <ion-card-title>Ensenada</ion-card-title>
        <ion-card-subtitle>Ranking Costa</ion-card-subtitle>
      </ion-card-header>
    </div>
  </ion-card>

  <ion-modal trigger="open-ranking-tijuana" [initialBreakpoint]="0.85" [breakpoints]="[0, 0.85, 1]">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Top Jugadores Tijuana</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content>
        <ion-list>
          <ion-item *ngFor="let jugador of (jugadoresTijuana$ | async); let i = index">
  <ion-avatar slot="start">
    <img [src]="'https://api.dicebear.com/7.x/avataaars/svg?seed=' + jugador.nombre" [alt]="'Avatar de ' + jugador.nombre">
  </ion-avatar>
  <ion-label>
    <h2>{{ i + 1 }}. {{ jugador.nombre }}</h2>
    <p>{{ jugador.club || 'Sin Club' }}</p>
  </ion-label>
  <ion-badge slot="end" color="primary">{{ jugador.nivel }}</ion-badge>
</ion-item>
        </ion-list>
      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
