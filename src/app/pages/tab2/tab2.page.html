<app-header-global titulo="Sedes AMT Tijuana"></app-header-global>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="ranking-intro">
    <h2>Rankings Locales</h2>
    <p>Estadísticas históricas de los tenistas en cada sede.</p>
  </div>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" *ngFor="let club of [
        {id: 'UDT', nombre: 'Unidad Deportiva Tijuana', sub: 'Sede Municipal', img: 'assets/img/deportiva.jpg'},
        {id: 'CBT', nombre: 'Club Bancario Tijuana', sub: 'Sede Otay', img: 'assets/img/bancario.jpg'},
        {id: 'CCT', nombre: 'Club Campestre Tijuana', sub: 'Sede Zona Río', img: 'assets/img/campestre.jpg'},
        {id: 'CBR', nombre: 'Club Britania Tijuana', sub: 'Sede Los Pinos', img: 'assets/img/britania.jpg'},
        {id: 'PA', nombre: 'Punta Azul', sub: 'Ensenada', img: 'assets/img/britania.jpg'}
      ]">
        <ion-card class="ranking-card" (click)="verRankingClub(club.nombre)" [id]="'trigger-' + club.id">
          <img [src]="club.img" [alt]="club.nombre">
          <div class="card-overlay">
            <ion-card-header>
              <ion-card-title>{{ club.nombre }}</ion-card-title>
              <ion-card-subtitle>{{ club.sub }}</ion-card-subtitle>
            </ion-card-header>
          </div>
        </ion-card>

        <ion-modal [trigger]="'trigger-' + club.id" [initialBreakpoint]="0.85" [breakpoints]="[0, 0.85, 1]">
          <ng-template>
            <ion-header class="ion-no-border">
              <ion-toolbar color="primary">
                <ion-title>Ranking: {{ club.nombre }}</ion-title>
                <ion-buttons slot="end">
                  <ion-icon name="trophy-outline" class="ion-padding-horizontal"></ion-icon>
                </ion-buttons>
              </ion-toolbar>
            </ion-header>

            <ion-content>
              <ion-list lines="full">
                <ion-item *ngFor="let jugador of (jugadoresClub$ | async); let i = index">
                  <ion-avatar slot="start">
                    <img [src]="'https://api.dicebear.com/7.x/avataaars/svg?seed=' + jugador.nombre">
                  </ion-avatar>
                  <ion-label>
                    <h2>{{ i + 1 }}. {{ jugador.nombre }}</h2>
                    <p>Puntos registrados: {{ jugador.puntos || 0 }}</p>
                  </ion-label>
                  <ion-badge slot="end" [color]="i < 3 ? 'warning' : 'medium'">
                    Nivel {{ jugador.nivel }}
                  </ion-badge>
                </ion-item>

                <div class="ion-padding ion-text-center" *ngIf="(jugadoresClub$ | async)?.length === 0">
                  <p>No hay jugadores registrados en esta sede todavía.</p>
                </div>
              </ion-list>
            </ion-content>
          </ng-template>
        </ion-modal>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
