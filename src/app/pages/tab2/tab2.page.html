<app-header-global titulo="Sedes AMT Tijuana"></app-header-global>

<ion-content [fullscreen]="true" class="ion-padding">
  
  <div class="ranking-intro">
    <h2>Rankings Locales</h2>
    <p>Estadísticas históricas de los tenistas en cada sede.</p>
  </div>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" *ngFor="let club of sedes">
        <ion-card class="ranking-card" (click)="abrirRankingClub(club.nombre, m)" button="true">
          <img [src]="club.img" [alt]="club.nombre">
          <div class="card-overlay">
            <ion-card-header>
              <ion-card-title>{{ club.nombre }}</ion-card-title>
              <ion-card-subtitle>{{ club.sub }}</ion-card-subtitle>
            </ion-card-header>
          </div>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-modal #m [initialBreakpoint]="0.85" [breakpoints]="[0, 0.85, 1]">
    <ng-template>
      <ion-header class="ion-no-border">
        <ion-toolbar color="primary">
          <ion-title>Ranking: {{ sedeSeleccionada }}</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="m.dismiss()">
              <ion-icon name="close-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content>
        <ion-list lines="full">
          <ion-item *ngFor="let jugador of rankingActual; let i = index" class="animate__animated animate__fadeIn">
            <ion-avatar slot="start">
              <img [src]="jugador.foto || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + jugador.nombre">
            </ion-avatar>
            <ion-label>
              <h2>{{ i + 1 }}. {{ jugador.nombre }}</h2>
              <p>Puntos: {{ jugador.xp || 0 }}</p>
            </ion-label>
            <ion-badge slot="end" [color]="i < 3 ? 'warning' : 'medium'">
              Nivel {{ jugador.nivel }}
            </ion-badge>
          </ion-item>

          <div class="ion-padding ion-text-center" *ngIf="rankingActual.length === 0">
            <ion-icon name="information-circle-outline" size="large" color="medium"></ion-icon>
            <p>No hay jugadores registrados en {{ sedeSeleccionada }} todavía.</p>
          </div>
        </ion-list>
      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
